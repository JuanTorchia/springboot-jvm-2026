services:
  postgres:
    image: postgres:17-alpine
    container_name: startup-lab-postgres
    environment:
      POSTGRES_DB: startup_lab
      POSTGRES_USER: startup
      POSTGRES_PASSWORD: startup
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U startup -d startup_lab"]
      interval: 1s
      timeout: 3s
      retries: 30
