spring.application.name=springboot-jvm-startup-lab
spring.main.banner-mode=off
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/startup_lab}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:startup}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:startup}
spring.threads.virtual.enabled=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
server.shutdown=graceful
logging.level.root=INFO
